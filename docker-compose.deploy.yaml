x-backend: &backend
  image: ${DOCKERHUB_USERNAME}/django-example:${APP_TAG}
  env_file: .env
  environment:
    DB_HOST: db
    DB_PORT: 5432
  depends_on:
    db:
      condition: service_healthy

x-healthcheck: &healthcheck
  interval: 3s
  timeout: 3s
  retries: 10

services:
  db:
    image: postgres:17.1-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U ${DB_USER} -d ${DB_NAME}
      <<: *healthcheck

  backend:
    <<: *backend
    command: sh -c "python manage.py migrate && \
      python manage.py collectstatic -c --no-input && \
      gunicorn config.wsgi --workers 4 --access-logfile - --error-logfile - -b 0.0.0.0:8000"
    volumes:
      - static:/app/static

  nginx:
    image: nginx:1.28-alpine
    restart: on-failure
    ports:
      - "${APP_PORT}:80"
    volumes:
      - static:/var/www/static/:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_started

volumes:
  pg_data:
  static: