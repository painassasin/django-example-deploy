name: CI

on:
  push:
    branches:
      - main
  pull_request:


env:
  PYTHON_VERSION: '3.13'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - name: Set up python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: false
      - name: Install dependencies
        run: poetry install
      - name: Run linters checks
        run: make check

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.1-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
    env:
      SECRET_KEY: test
      DEBUG: true
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432
    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - name: Set up python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: false
      - name: Install dependencies
        run: poetry install
      - name: Run linters checks
        run: make test